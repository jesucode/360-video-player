<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>videojs-vr Demo</title>
  <link href="./node_modules/video.js/dist/video-js.css" rel="stylesheet">
  <link href="./dist/videojs-vr.css" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
</head>

<body>
  <div class="fullscreen-input" id="input-container">
    <label for="myfile" id="fileLabel"></label>
    <input type="file" id="myfile" name="myfile">
  </div>
  <div class="hidden" id="video-container">
    <video width="640" height="300" id="videojs-vr-player" class="video-js vjs-default-skin fullscreen-video" controls
      playsinline>
      <source src="" type="video/mp4">
    </video>
  </div>
  <script src="./node_modules/video.js/dist/video.js"></script>
  <script src="./dist/videojs-vr.js"></script>
  <script>
    document.getElementById('fileLabel').addEventListener('dragover', function (event) {
      event.preventDefault(); // Prevent default behavior (Prevent file from being opened)
      event.stopPropagation();
      this.style.backgroundColor = '#2196F3'; // Optional: Change color on drag over
    });

    document.getElementById('fileLabel').addEventListener('dragleave', function (event) {
      event.preventDefault();
      event.stopPropagation();
      this.style.backgroundColor = '#4CAF50'; // Change back to original color
    });

    document.getElementById('fileLabel').addEventListener('drop', function (event) {
      event.preventDefault();
      event.stopPropagation();
      this.style.backgroundColor = '#4CAF50'; // Change back to original color
      var files = event.dataTransfer.files; // Get the files that were dropped
      if (files.length > 0) {
        document.getElementById('myfile').files = files; // Set the files to the input
      }
    });



    document.getElementById('myfile').addEventListener('change', function (event) {
      var file = event.target.files[0];
      var videoContainer = document.getElementById('video-container');
      var inputContainer = document.getElementById('input-container');
      var source = document.querySelector('#videojs-vr-player source');

      inputContainer.classList.add('hidden');
      videoContainer.classList.remove('hidden');
      // Update the source element's src attribute with the file URL
      source.src = URL.createObjectURL(file);

      // Hide the input container and show the video container
      (function (window, videojs) {
        var player = window.player = videojs('videojs-vr-player');
        player.mediainfo = player.mediainfo || {};
        player.mediainfo.projection = '360';

        // AUTO is the default and looks at mediainfo
        var vr = window.vr = player.vr({projection: 'AUTO', debug: true, forceCardboard: false});
      }(window, window.videojs));

      // Reload the video player to load the new source
      player.load();
      player.play(); // Optionally play the video automatically
    });
  </script>
</body>

</html>
